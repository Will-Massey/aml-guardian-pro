# Render Blueprint for AML Guardian Pro

services:
  # Backend API Service
  - type: web
    name: aml-guardian-backend
    runtime: node
    plan: standard
    region: frankfurt
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: COMPANIES_HOUSE_BASE_URL
        value: https://api.company-information.service.gov.uk
      - key: LOG_LEVEL
        value: info
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      # Secrets - Set manually in Render dashboard
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: COMPANIES_HOUSE_API_KEY
        sync: false
      - key: CLAURST_PROVIDER
        value: anthropic
      - key: CLAURST_MODEL
        value: claude-opus-4
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: uploads
      mountPath: /tmp/uploads
      sizeGB: 1

  # Frontend Web Service
  - type: web
    name: aml-guardian-frontend
    runtime: node
    plan: standard
    region: frankfurt
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        value: https://aml-guardian-backend.onrender.com/api
